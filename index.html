<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APG Production Bericht Bochum</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --text: #f1f5f9; --danger: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .card { width: 100%; max-width: 650px; background: var(--card); padding: 25px; border-radius: 20px; margin: auto; border: 2px solid var(--primary); box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .title-area { text-align: center; border-bottom: 3px solid var(--primary); margin-bottom: 25px; padding-bottom: 15px; }
        .title-area h1 { margin: 0; color: white; font-size: 20px; }
        .title-area p { margin: 5px 0 0; color: var(--primary); font-weight: bold; font-size: 14px; text-transform: uppercase; }
        label { display: block; margin: 15px 0 5px; color: var(--primary); font-weight: bold; font-size: 14px; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--primary); background: #0f172a; color: white; font-size: 16px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .worker-box, .artikel-box { background: rgba(56,189,248,0.05); padding: 15px; border-radius: 15px; margin-top: 15px; border-left: 5px solid var(--primary); position: relative; }
        .delete-btn { position: absolute; right: 10px; top: 10px; background: var(--danger); color: white; border: none; border-radius: 5px; width: 25px; height: 25px; cursor: pointer; }
        .add-btn { width: 100%; padding: 12px; margin-top: 10px; background: transparent; border: 2px dashed var(--primary); color: var(--primary); font-weight: bold; border-radius: 10px; cursor: pointer; }
        .sub-btn { background: #1e40af; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .main-btn { width: 100%; padding: 18px; background: var(--primary); color: #0f172a; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; margin-top: 30px; cursor: pointer; text-transform: uppercase; }
        .ft-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #0f172a; padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px solid var(--primary); }
        .ft-item { text-align: center; font-size: 13px; color: var(--primary); }
        .ft-item input { width: 22px; height: 22px; cursor: pointer; }
        .error-msg { color: #fbbf24; font-size: 12px; font-weight: bold; margin-top: 8px; display: none; text-align: center; border: 1px solid #fbbf24; padding: 5px; border-radius: 5px; }
        .code-row { display: flex; gap: 5px; margin-top: 8px; align-items: center; }
        .row-del { background: none; border: none; color: red; font-weight: bold; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

<div class="card">
    <div class="title-area">
        <h1>Adler Pelzer Group</h1>
        <p>Production Bericht Bochum</p>
    </div>

    <label>Schicht wählen</label>
    <select id="schichtWahl" onchange="document.getElementById('workerContainer').innerHTML=''">
        <option value="B">Schicht - B</option>
        <option value="A">Schicht - A</option>
        <option value="C">Schicht - C</option>
    </select>

    <div id="workerContainer"></div>
    <button type="button" class="add-btn" onclick="addWorker()">+ Mitarbeiter hinzufügen</button>

    <div style="height: 2px; background: var(--primary); opacity: 0.3; margin: 25px 0;"></div>

    <div class="grid">
        <div><label>Datum</label><input type="date" id="datum"></div>
        <div>
            <label>Anlage</label>
            <select id="anlage" onchange="toggleAnlage(this.value)">
                <option value="">Wählen...</option>
                <optgroup label="PUR (Schaum)">
                    <option value="PUR1">PUR 1</option><option value="PUR2">PUR 2</option><option value="PUR3">PUR 3</option>
                    <option value="PUR4">PUR 4</option><option value="PUR5">PUR 5</option><option value="PUR6">PUR 6</option>
                    <option value="PUR7">PUR 7</option><option value="PUR8">PUR 8</option><option value="PUR9">PUR 9</option>
                </optgroup>
                <optgroup label="Spritzguss">
                    <option value="IM1">IM 1</option><option value="IM2">IM 2</option><option value="IM3">IM 3</option>
                    <option value="IM4">IM 4</option><option value="IM5">IM 5</option><option value="CIM1">CIM 1</option>
                </optgroup>
                <option value="COM">Compound</option>
            </select>
        </div>
    </div>

    <div id="ftBox" style="display:none;">
        <label>Formträger (FT)</label>
        <div class="ft-container">
            <div class="ft-item"><input type="checkbox" class="ft-check" value="FT1"><br>FT1</div>
            <div class="ft-item"><input type="checkbox" class="ft-check" value="FT2"><br>FT2</div>
            <div class="ft-item"><input type="checkbox" class="ft-check" value="FT3"><br>FT3</div>
            <div class="ft-item"><input type="checkbox" class="ft-check" value="FT4"><br>FT4</div>
            <div class="ft-item"><input type="checkbox" class="ft-check" value="FT5"><br>FT5</div>
            <div class="ft-item"><input type="checkbox" class="ft-check" value="FT6"><br>FT6</div>
        </div>
    </div>

    <div id="comTimeBox" style="display:none; margin-top:15px; text-align:center; background:rgba(56,189,248,0.1); padding:10px; border-radius:10px;">
        <span style="color:var(--primary); font-weight:bold;">Compound Zeit: <span id="comCounter">0</span> / 480 Min</span>
    </div>

    <div id="artikelContainer"></div>
    <button type="button" class="add-btn" onclick="addArtikel()">+ Artikel hinzufügen</button>

    <button type="button" class="main-btn" onclick="sendAllData()">🚀 SPEICHERN & SENDEN</button>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbx55ShhJiujy6xj8lJZoDOoRh5wSpYpbPCbCNVoKnqR53gSUwsmKzSVv4ZXaihBQwwzVg/exec";
const WHATSAPP_NR = "+4917623638794";

// Tarihi otomatik yazan fonksiyon
window.onload = function() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('datum').value = today;
};

const workerLists = {
    "A": ["Kunert M. - 502", "Karali O. - 533 E", "Mikuczynski K. - 1212", "Türkmen E. - 1213 E", "Amrouch M. - 1268", "Stania D. - 1368", "Kantaroglu A. - 1382", "Krancioch A. - 1405", "Held D. - 1421", "Berisha I. - 1534", "Neji M. - 1536", "Mulugeta G. - 1633", "Udezue P. - 1686", "Jansen M. - 1692", "Aksoy O. - 1704", "Yildirim S. - 1710", "Brand N. - 1722", "Louze A. - 1724", "Blanquez Romero V. - 1725", "Diallo M.D. - 1726", "Sener E. - 1731 E", "Sonstige"],
    "B": ["Keskin Mur.-517", "Aldirmaz P.-577", "Anderwald R.-509 E", "Bayrakli F.-1377 E", "Kilic D.-1384 E", "Maafi T.-1273 E", "Besche T.-1472", "Eickhoff P.-1406", "Toth Renata-1699", "Gibba n.-1367", "Helf A.-1483", "Isbir J.-1715", "Jeyakumar S.-1698", "Kalisch T.-1451", "Kowarsch R.-484", "Nowak M.-1390", "Pähler D.-1332", "Patarcsity V.-1700", "Pulendran K.-1498", "Sahin E.-1721", "Savas S.-1360", "Schiavitelli C.-1669", "Uluyüz B.-1450", "Uzun S.-1433", "Sonstige"],
    "C": ["Beher T. - 510", "Keskin Mustafa - 518", "Kantaroglu Ö. - 580", "Savas R. - 608", "Rafo S. - 1277", "Gertz Kevin - 1357", "Gertz S. - 1358 E", "Schönborn Ch. - 1361", "Fortes Ch. - 1381", "Sakaguchi M. - 1391", "Mercan M. - 1437 E", "Krämer Ch. - 1449", "Juretzka T. - 1473", "Kumbara E. - 1474", "Skupio D. - 1475", "Skrago T. - 1484", "Bah A. - 1684", "Kaya A. - 1712", "Jdea A. - 1701", "Toure A. - 1713", "Schneider D. - 1714", "Tchaleu Bertrand - 1723", "Sonstige"]
};

const codes = {
    PUR: {
        aus: ["6-2-01 Temperatur zu niedrig", "6-2-02 Schaum haftet nicht", "6-2-03 Einlegefehler Bauteil", "6-2-04 Einlegefehler CIM", "6-2-05 Schussabbruch", "6-2-06 CIM nicht voll", "6-2-07 Lippe gerissen", "6-2-08 CIM gerissen", "Sonstige"],
        stoer: ["3-01 Werkzeugwechsel", "3-02 Materialumstellung", "4-2-01 Ungepl. Inst. Werkzeug", "4-2-02 Ungepl. Inst. Maschine", "4-2-03 POLY/ISO Überdruck", "4-2-04 Mischkopf n.i.o.", "4-2-05 Fehler Lichtschranke", "4-2-06 Trennmittelpistole", "4-2-07 Formträger Initiator", "4-2-08 Reinigung Werkzeug", "5-2-01 Logistik Mangel", "5-2-04 Wartezeit Einrichter", "5-2-10 Poly/Iso leer", "Sonstige"]
    },
    IM: {
        aus: ["6-1-01 Anfahrschrott", "6-1-02 Materialumstellung", "6-1-03 CIM n.voll", "6-1-04 CIM gerissen", "6-1-05 Überspritzung", "6-1-06 Einfallstellen", "6-1-07 Brandstellen", "6-1-08 Silberstreifen", "Sonstige"],
        stoer: ["3-01 Werkzeugwechsel", "3-02 Materialumstellung", "4-1-01 Ungepl. Inst. Werkzeug", "4-1-02 Ungepl. Inst. Maschine", "4-1-03 Materialförderung", "4-1-04 Dosiereinheit", "4-1-05 Schließeinheit", "4-1-06 Teileentnahme", "4-1-07 WZ-Heizung", "5-1-03 Wartezeit Einrichter", "Sonstige"]
    },
    COM: {
        aus: ["6-3-01 Anfahrschrott", "6-3-02 Materialfehler", "Sonstige"],
        stoer: ["3-01 Werkzeugwechsel", "3-02 Materialumstellung", "4-3-01 Messer schleifen", "4-3-02 Ungepl. Inst. Maschine", "4-3-04 Silowechsel", "5-3-01 Mat-Mangel", "5-3-05 Feueralarm", "Sonstige"]
    }
};

function toggleAnlage(val) {
    document.getElementById("ftBox").style.display = val.startsWith("PUR") ? "block" : "none";
    document.getElementById("comTimeBox").style.display = val === "COM" ? "block" : "none";
    document.getElementById("artikelContainer").innerHTML = "";
    updateCounter();
}

function addWorker() {
    const s = document.getElementById("schichtWahl").value;
    const div = document.createElement("div");
    div.className = "worker-box";
    div.innerHTML = `<button type="button" class="delete-btn" onclick="this.parentElement.remove()">✕</button>
        <select class="w-sel" onchange="this.nextElementSibling.style.display=(this.value==='Sonstige'?'block':'none')">
            ${workerLists[s].map(w => `<option value="${w}">${w}</option>`).join("")}
        </select><input type="text" style="display:none; margin-top:10px;" placeholder="Name...">`;
    document.getElementById("workerContainer").appendChild(div);
}

function addArtikel() {
    const anl = document.getElementById("anlage").value;
    if(!anl) return alert("Anlage wählen!");
    const div = document.createElement("div");
    div.className = "artikel-box";
    div.innerHTML = `<button type="button" class="delete-btn" onclick="this.parentElement.remove(); updateCounter();">✕</button>
        <label>Artikel Bezeichnung</label><input class="artName" type="text" placeholder="">
        ${anl==='COM' ? '<label>Dauer (Min)</label><input type="number" class="artDauer" oninput="updateCounter()">' : ''}
        <div class="grid">
            <div><label>Gut</label><input type="number" class="gut"></div>
            <div><label>Ausschuss Gesamt</label><input type="number" class="ausTotal" oninput="validate(this.closest('.artikel-box'))"></div>
        </div>
        <div class="error-msg">⚠️ Ausschuss-Summe stimmt nicht überein!</div>
        <div class="row-list"></div>
        <div class="grid">
            <button type="button" class="sub-btn" onclick="addRow(this,'aus')">+ Ausschuss</button>
            <button type="button" class="sub-btn" onclick="addRow(this,'stoer')">+ Störung</button>
        </div>`;
    document.getElementById("artikelContainer").appendChild(div);
}

function addRow(btn, type) {
    const anl = document.getElementById("anlage").value;
    let cat = anl === "COM" ? "COM" : (anl.startsWith("PUR") ? "PUR" : "IM");
    const target = btn.parentElement.previousElementSibling;
    const row = document.createElement("div");
    row.className = "code-row";
    row.innerHTML = `<select class="${type}-c" style="flex:2;">${codes[cat][type].map(c=>`<option value="${c}">${c}</option>`).join("")}</select>
        <input type="number" class="${type}-v" style="flex:1;" oninput="validate(this.closest('.artikel-box'))" placeholder="Menge/Min">
        <button type="button" onclick="this.parentElement.remove(); validate(this.closest('.artikel-box'))" class="row-del">✕</button>`;
    target.appendChild(row);
}

function validate(box) {
    const total = parseFloat(box.querySelector(".ausTotal").value) || 0;
    let sum = 0;
    box.querySelectorAll(".aus-v").forEach(i => sum += (parseFloat(i.value) || 0));
    box.querySelector(".error-msg").style.display = (total > 0 && total !== sum) ? "block" : "none";
}

function updateCounter() {
    let total = 0;
    document.querySelectorAll(".artDauer").forEach(i => total += (parseFloat(i.value) || 0));
    if(document.getElementById("comCounter")) document.getElementById("comCounter").innerText = total;
}

async function sendAllData() {
    const anl = document.getElementById("anlage").value;
    const counterVal = parseFloat(document.getElementById("comCounter")?.innerText || 0);
    if(!anl) return alert("Anlage wählen!");
    if(anl === "COM" && counterVal !== 480) return alert("Dauer muss 480 Min sein!");
    
    let err = false;
    document.querySelectorAll(".error-msg").forEach(m => { if(m.style.display === "block") err = true; });
    if(err) return alert("Ausschuss prüfen!");

    let staff = [];
    document.querySelectorAll(".worker-box").forEach(box => {
        const s = box.querySelector(".w-sel").value;
        staff.push(s === "Sonstige" ? box.querySelector("input").value : s);
    });

    let ftList = [];
    document.querySelectorAll(".ft-check:checked").forEach(c => ftList.push(c.value));
    
    let report = `📊 *APG BOCHUM REPORT*\n📅 Datum: ${document.getElementById("datum").value}\n⏱️ Schicht: ${document.getElementById("schichtWahl").value}\n🏭 Anlage: ${anl}\n${ftList.length>0 ? '🛠 FT: '+ftList.join(', ')+'\n' : ''}👷 Personal: ${staff.join(", ")}\n\n`;

    document.querySelectorAll(".artikel-box").forEach(box => {
        report += `📦 *${box.querySelector(".artName").value || "Unbekannt"}*\n  └ Gut: ${box.querySelector(".gut").value || 0} | Aus: ${box.querySelector(".ausTotal").value || 0}\n`;
        box.querySelectorAll(".aus-v").forEach((v, i) => { if(v.value) report += `  ⚠️ ${box.querySelectorAll(".aus-c")[i].value}: ${v.value}\n`; });
        box.querySelectorAll(".stoer-v").forEach((v, i) => { if(v.value) report += `  ⚙️ ${box.querySelectorAll(".stoer-c")[i].value}: ${v.value} Min\n`; });
    });

    // Sheets Kayıt
    try {
        await fetch(scriptURL, { method: "POST", mode: "no-cors", body: JSON.stringify({ datum: document.getElementById("datum").value, anlage: anl, report }) });
    } catch(e) {}
    
    // WhatsApp Yönlendirme
    window.location.href = `whatsapp://send?phone=${WHATSAPP_NR}&text=${encodeURIComponent(report)}`;
}
</script>
</body>
</html>
