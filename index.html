    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --blue-dark: #1e40af; --text: #f1f5f9; --danger: #ef4444; --success: #22c55e; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        #loginScreen, #setPassScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--card); padding: 30px; border-radius: 20px; border: 2px solid var(--primary); width: 90%; max-width: 400px; text-align: center; }
        .card { width: 100%; max-width: 650px; background: var(--card); padding: 20px; border-radius: 20px; margin: auto; border: 1px solid rgba(56, 189, 248, 0.3); display: none; }
        .header { text-align: center; border-bottom: 3px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        .schicht-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .schicht-btn { padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; }
        .schicht-btn.active { background: var(--primary); color: #0f172a; }
        label { display: block; margin: 15px 0 5px; color: var(--primary); font-weight: bold; font-size: 13px; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        #workerOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .overlay-content { background: var(--card); width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; border-radius: 20px; padding: 20px; border: 1px solid var(--primary); }
        .worker-opt { padding: 12px; border-bottom: 1px solid #334155; cursor: pointer; }
        .selected-worker { display: flex; justify-content: space-between; padding: 10px; background: rgba(56,189,248,0.1); border-radius: 10px; margin-top: 5px; border: 1px solid var(--primary); }
        .section-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid rgba(56, 189, 248, 0.1); position: relative; }
        .ft-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .ft-btn { padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #94a3b8; cursor: pointer; }
        .ft-btn.active { background: var(--blue-dark); color: white; border-color: var(--primary); }
        .main-btn { width: 100%; padding: 18px; background: var(--primary); color: #0f172a; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; margin-top: 20px; cursor: pointer; }
        .main-btn:disabled { background: #475569; cursor: not-allowed; }
        .add-btn { width: 100%; padding: 10px; margin-top: 10px; background: transparent; border: 2px dashed var(--primary); color: var(--primary); border-radius: 10px; cursor: pointer; }
        .sub-btn { background: var(--blue-dark); color: white; padding: 8px; border-radius: 8px; border: none; cursor: pointer; font-size: 11px; flex: 1; font-weight: bold; }
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 15px; font-size: 11px; font-weight: bold; margin-top: 8px; }
        .status-ok { background: var(--success); color: black; }
        .status-error { background: var(--danger); color: white; }
        
        .code-row { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 10px; border: 1px solid #334155; }
        .code-row-inputs { display: flex; gap: 8px; align-items: center; width: 100%; }
        .sonstige-input { width: 100%; margin-top: 4px; display: none; border-color: var(--primary); background: #0f172a; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <h2 style="color:var(--primary); margin-top:0;">APG LOGIN</h2>
        <p style="font-size:12px; color:#94a3b8;">Bitte Nachname und Passwort eingeben</p>
        <input type="text" id="userInp" placeholder="Nachname">
        <input type="password" id="passInp" placeholder="Passwort" style="margin-top:10px;">
        <button class="main-btn" id="loginBtn" onclick="checkLogin()">ANMELDEN</button>
        <p id="loginError" style="color:red; font-size:12px; margin-top:10px; display:none;">⚠️ Zugangsdaten falsch!</p>
    </div>
</div>

<div id="setPassScreen" style="display:none;">
    <div class="login-card">
        <h3 style="color:var(--primary);">ERSTES LOGIN</h3>
        <p style="font-size:12px;">Bitte ein neues, privates Passwort festlegen:</p>
        <input type="password" id="newPass1" placeholder="Neues Passwort">
        <input type="password" id="newPass2" placeholder="Wiederholen" style="margin-top:10px;">
        <button class="main-btn" id="savePassBtn" onclick="saveNewPassword()">PASSWORT AKTIVIEREN</button>
    </div>
</div>

<div class="card" id="mainApp">
    <div class="header">
        <h1>Adler Pelzer Group</h1>
        <p id="currentUserDisplay" style="color:var(--success); font-size:12px; font-weight:bold;"></p>
    </div>

    <div class="grid-2">
        <div>
            <label>Schicht wählen</label>
            <div class="schicht-group">
                <button class="schicht-btn" id="btnA" onclick="setSchicht('A')">A</button>
                <button class="schicht-btn" id="btnB" onclick="setSchicht('B')">B</button>
                <button class="schicht-btn" id="btnC" onclick="setSchicht('C')">C</button>
            </div>
        </div>
        <div>
            <label>Schichtart</label>
            <div class="schicht-group">
                <button class="schicht-btn type-btn" id="sFrueh" onclick="setSchichtType('Frühschicht')">Früh</button>
                <button class="schicht-btn type-btn" id="sSpaet" onclick="setSchichtType('Spätschicht')">Spät</button>
                <button class="schicht-btn type-btn" id="sNacht" onclick="setSchichtType('Nachtschicht')">Nacht</button>
            </div>
        </div>
    </div>

    <div id="workerDisplayContainer"></div>
    <button class="add-btn" onclick="openWorkerOverlay()">+ Mitarbeiter hinzufügen</button>
    
    <div class="grid-2" style="margin-top:20px;">
        <div>
            <label>Datum auswählen</label>
            <input type="date" id="datum">
        </div>
        <div><label>Anlage</label>
            <select id="anlage" onchange="onAnlageChange(this.value)">
                <option value="">Wählen...</option>
                <optgroup label="PUR"><option value="PUR1">PUR 1</option><option value="PUR2">PUR 2</option><option value="PUR3">PUR 3</option><option value="PUR4">PUR 4</option><option value="PUR5">PUR 5</option><option value="PUR6">PUR 6</option><option value="PUR7">PUR 7</option><option value="PUR8">PUR 8</option><option value="PUR9">PUR 9</option></optgroup>
                <optgroup label="Spritzguss"><option value="IM1">IM 1</option><option value="IM2">IM 2</option><option value="IM3">IM 3</option><option value="IM4">IM 4</option><option value="IM5">IM 5</option><option value="CIM1">CIM 1</option></optgroup>
                <option value="COM">Compound</option>
            </select>
        </div>
    </div>
    <div id="ftBox" style="display:none;"><label>Formträger (FT)</label><div class="ft-grid"><button class="ft-btn" onclick="this.classList.toggle('active')">FT1</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT2</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT3</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT4</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT5</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT6</button></div></div>
    <div id="comTimeBox" style="display:none; margin-top:15px; text-align:center; background:rgba(56,189,248,0.1); padding:10px; border-radius:10px;"><span style="font-weight:bold; color:var(--primary);">Compound: <span id="comTotal">0</span> / 480 Min</span></div>
    <div id="artikelContainer"></div>
    <button class="add-btn" onclick="addArtikel()">+ Artikel hinzufügen</button>
    <button id="mainSendBtn" class="main-btn" onclick="processReport()">🚀 SPEICHERN & SENDEN</button>
</div>

<div id="workerOverlay">
    <div class="overlay-content">
        <h3 style="color:var(--primary);">Mitarbeiter wählen</h3>
        <div id="workerList"></div>
        <div style="margin-top:15px; border-top:1px solid #444; padding-top:10px;">
            <input type="text" id="manualWorker" placeholder="Name manuell...">
            <button class="add-btn" onclick="addManualWorker()">Hinzufügen</button>
        </div>
        <button class="main-btn" onclick="document.getElementById('workerOverlay').style.display='none'">Schließen</button>
    </div>
</div>

window.addEventListener('DOMContentLoaded', () => { 
    const today = new Date();
    const year = today.getFullYear();
    const month = String(today.getMonth() + 1).padStart(2, '0');
    const day = String(today.getDate()).padStart(2, '0');
    document.getElementById('datum').value = `${year}-${month}-${day}`;
});

async function checkLogin() {
    const btn = document.getElementById('loginBtn'); const u = document.getElementById('userInp').value.trim(); const p = document.getElementById('passInp').value.trim();
    if(!initialDB[u]) { document.getElementById('loginError').innerText = "⚠️ Benutzer nicht gefunden!"; document.getElementById('loginError').style.display = 'block'; return; }
    btn.innerText = "Check... ⏳"; document.getElementById('loginError').style.display = 'none';
    try {
        const response = await fetch(scriptURL); const cloudDB = await response.json();
        if (cloudDB[u]) {
            if (cloudDB[u] === p) { enterApp(u); } 
            else { document.getElementById('loginError').innerText = "⚠️ Falsches Passwort!"; document.getElementById('loginError').style.display = 'block'; }
        } else {
            if (initialDB[u] === p) { loggedInUser = u; document.getElementById('loginScreen').style.display='none'; document.getElementById('setPassScreen').style.display='flex'; } 
            else { document.getElementById('loginError').innerText = "⚠️ Falsche Personalnummer!"; document.getElementById('loginError').style.display = 'block'; }
        }
    } catch(e) { if (initialDB[u] === p) enterApp(u); }
    btn.innerText = "ANMELDEN";
}

async function saveNewPassword() {
    const btn = document.getElementById('savePassBtn'); const p1 = document.getElementById('newPass1').value; const p2 = document.getElementById('newPass2').value;
    if (p1.length > 3 && p1 === p2) {
        btn.innerText = "Aktivieren... ⏳";
        try {
            await fetch(scriptURL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "setPassword", username: loggedInUser, password: p1 }) });
            enterApp(loggedInUser);
        } catch(e) { alert("Fehler beim Speichern."); }
    } else { alert("Passwörter müssen übereinstimmen ve min. 4 Zeichen!"); }
    btn.innerText = "PASSWORT AKTIVIEREN";
}

function enterApp(u) { loggedInUser = u; document.getElementById('loginScreen').style.display='none'; document.getElementById('setPassScreen').style.display='none'; document.getElementById('mainApp').style.display='block'; document.getElementById('currentUserDisplay').innerText = "Angemeldet: " + u; setSchicht('B'); setSchichtType('Frühschicht'); }
function setSchicht(s) { currentSchicht = s; document.querySelectorAll('.schicht-group .schicht-btn').forEach(b => { if(!b.classList.contains('type-btn')) b.classList.remove('active'); }); const target = Array.from(document.querySelectorAll('.schicht-group .schicht-btn')).find(b => b.innerText === s && !b.classList.contains('type-btn')); if(target) target.classList.add('active'); selectedStaff=[]; renderStaff(); }
function setSchichtType(type) { currentSchichtType = type; document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active')); if(type=='Frühschicht') document.getElementById('sFrueh').classList.add('active'); if(type=='Spätschicht') document.getElementById('sSpaet').classList.add('active'); if(type=='Nachtschicht') document.getElementById('sNacht').classList.add('active'); }
function openWorkerOverlay() { document.getElementById('workerList').innerHTML = workerData[currentSchicht].map(w => `<div class="worker-opt" onclick="addStaff('${w}')">${w}</div>`).join(""); document.getElementById('workerOverlay').style.display='flex'; }
function addStaff(n) { if(!selectedStaff.includes(n)) selectedStaff.push(n); document.getElementById('workerOverlay').style.display='none'; renderStaff(); }
function addManualWorker() { const v = document.getElementById('manualWorker').value; if(v) { selectedStaff.push("✍️ " + v); document.getElementById('manualWorker').value=""; document.getElementById('workerOverlay').style.display='none'; renderStaff(); } }
function renderStaff() { document.getElementById('workerDisplayContainer').innerHTML = selectedStaff.map(s => `<div class="selected-worker"><span>${s}</span><span onclick="removeStaff('${s}')" style="color:red; cursor:pointer;">✕</span></div>`).join(""); liveCheck(); }
function removeStaff(n) { selectedStaff = selectedStaff.filter(x => x !== n); renderStaff(); }
function onAnlageChange(v) { document.getElementById('ftBox').style.display = v.startsWith("PUR") ? "block" : "none"; document.getElementById('comTimeBox').style.display = v === "COM" ? "block" : "none"; document.getElementById('artikelContainer').innerHTML = ""; liveCheck(); }

function addArtikel() {
    const id = Date.now(); const div = document.createElement('div'); div.className = "section-card artikel-row"; div.id = `art_${id}`;
    div.innerHTML = `<button onclick="this.parentElement.remove(); liveCheck();" style="position:absolute; right:10px; top:10px; background:red; color:white; border:none; border-radius:5px;">✕</button>
        <label>Artikel</label><input type="text" class="art-name" placeholder="Name eingeben...">
        ${document.getElementById('anlage').value==='COM' ? '<label>Dauer (Min)</label><input type="number" class="art-duration" placeholder="Minuten..." oninput="liveCheck()">' : ''}
        <div class="grid-2" style="margin-top:10px;"><div><label>Gut</label><input type="number" class="art-gut" placeholder="Anzahl..."></div><div><label>Aus Gesamt</label><input type="number" class="art-aus-total" placeholder="Anzahl..." oninput="liveCheck()"></div></div>
        <div class="status-badge" id="badge_${id}"></div><div id="rows_${id}"></div>
        <div style="display:flex; gap:10px; margin-top:10px;"><button class="sub-btn" onclick="addRow('${id}','aus')">+ Ausschuss</button><button class="sub-btn" onclick="addRow('${id}','stoer')">+ Störung</button></div>`;
    document.getElementById('artikelContainer').appendChild(div);
}

function addRow(artId, type) {
    const anl = document.getElementById('anlage').value; const cat = anl==='COM'?'COM':(anl.startsWith("PUR")?'PUR':'Spritz');
    const div = document.createElement('div'); div.className="code-row";
    div.innerHTML = `<div class="code-row-inputs"><select class="${type}-c" style="flex:3;" onchange="this.parentElement.nextElementSibling.style.display=(this.value==='Sonstige'?'block':'none')">
        ${codeData[cat][type].map(c => `<option value="${c}">${c}</option>`).join("")}</select><input type="number" class="${type}-v" style="flex:1; min-width:80px;" placeholder="Menge/Min" oninput="liveCheck()">
        <button onclick="this.parentElement.parentElement.remove(); liveCheck();" style="color:red; background:none; border:none; font-weight:bold; font-size:16px; padding:0 5px;">✕</button></div><input type="text" class="sonstige-input" placeholder="Grund manuell...">`;
    document.getElementById(`rows_${artId}`).appendChild(div);
}

function liveCheck() {
    let v = true; let cT = 0;
    document.querySelectorAll('.artikel-row').forEach(row => {
        const id = row.id.split('_')[1]; const t = parseInt(row.querySelector('.art-aus-total').value) || 0;
        let s = 0; row.querySelectorAll('.aus-v').forEach(i => s += parseInt(i.value) || 0);
        const b = document.getElementById('badge_' + id);
        if(t > 0 && t !== s) { b.className="status-badge status-error"; b.innerText = "⚠️ Differenz: " + s + "/" + t; v=false; }
        else if(t > 0) { b.className="status-badge status-ok"; b.innerText = "✅ OK: " + s + "/" + t; } else { b.innerText=""; }
        if(document.getElementById('anlage').value==='COM') cT += parseInt(row.querySelector('.art-duration')?.value) || 0;
    });
    if(document.getElementById('anlage').value==='COM') { document.getElementById('comTotal').innerText = cT; if(cT !== 480) v = false; }
    if(selectedStaff.length === 0 || !document.getElementById('anlage').value) v = false;
    document.getElementById('mainSendBtn').disabled = !v;
}

async function processReport() {
    const btn = document.getElementById('mainSendBtn'); btn.innerText = "Sende..."; btn.disabled = true;
    const fts = Array.from(document.querySelectorAll('.ft-btn.active')).map(x => x.innerText).join(", ");
    
    const rawDate = document.getElementById('datum').value;
    let formattedReportDate = "";
    if(rawDate) {
        const parts = rawDate.split("-");
        if(parts.length === 3) formattedReportDate = parts[2] + "." + parts[1] + "." + parts[0];
    }

    let articlesArray = [];
    let whatsappDetails = ""; 

    document.querySelectorAll('.artikel-row').forEach(row => {
        let artName = row.querySelector('.art-name').value || "NA";
        let artGut = row.querySelector('.art-gut').value || 0;
        let artAusTotal = row.querySelector('.art-aus-total').value || 0;
        
        let ausCodes = [];
        let stoerCodes = [];

        row.querySelectorAll('.code-row').forEach(cr => {
            const val = cr.querySelector('input[type="number"]').value;
            if(val > 0) {
                let n = cr.querySelector('select').value;
                if(n === "Sonstige") n = "✍️ " + (cr.querySelector('.sonstige-input').value || "Sonstige");
                
                if (cr.querySelector('select').classList.contains('aus-c')) {
                    ausCodes.push(n + " (" + val + " Stk)");
                } else {
                    stoerCodes.push(n + " (" + val + " Min)");
                }
            }
        });

        articlesArray.push({
            name: artName,
            gut: artGut,
            ausTotal: artAusTotal,
            ausDetails: ausCodes.join(" | ") || "-",
            stoerDetails: stoerCodes.join(" | ") || "-"
        });

        whatsappDetails += "━━━━━━━━━━\n📦 *Artikel:* " + artName + "\n✅ Gut: " + artGut + "\n⚠️ Aus: " + artAusTotal + "\n";
        ausCodes.forEach(c => whatsappDetails += "⚠️ " + c + "\n");
        stoerCodes.forEach(c => whatsappDetails += "⚙️ " + c + "\n");
    });

    const repText = "📊 *APG REPORT*\n\n👷 *Personal:* " + selectedStaff.join(", ") + "\n🏭 *Anlage:* " + document.getElementById('anlage').value + "\n📅 *Datum:* " + formattedReportDate + "\n⏱ *Gruppe:* " + currentSchicht + " Schicht\n🕒 *Schichtart:* " + currentSchichtType + "\n" + (fts ? '🛠 *FT:* '+fts+'\n' : '') + whatsappDetails + "\n👤 *Gesendet von:* " + loggedInUser + "\n━━━━━━━━━━";
    
    const payload = {
        action: "sendReport",
        sender: loggedInUser,
        staff: selectedStaff.join(", "),
        anlage: document.getElementById('anlage').value,
        schicht: currentSchicht, 
        schichtType: currentSchichtType, 
        customDate: formattedReportDate, 
        ft: fts || "-",
        articles: articlesArray
    };

    try { 
        await fetch(scriptURL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        window.location.href = "whatsapp://send?phone=" + WHATSAPP_NR + "&text=" + encodeURIComponent(repText);
    } catch(e) { 
        window.location.href = "whatsapp://send?phone=" + WHATSAPP_NR + "&text=" + encodeURIComponent(repText); 
    }
    setTimeout(() => { btn.innerText = "🚀 SPEICHERN & SENDEN"; btn.disabled = false; }, 2000);
}
</script>
