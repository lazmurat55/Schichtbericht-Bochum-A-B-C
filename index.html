<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APG Production Bericht Bochum</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --text: #f1f5f9; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 10px; margin: 0; }
        .card { max-width: 650px; background: var(--card); padding: 25px; border-radius: 24px; margin: auto; border: 1px solid var(--primary); }
        .title-area { text-align: center; border-bottom: 3px solid var(--primary); margin-bottom: 20px; }
        label { display: block; margin: 15px 0 5px; color: var(--primary); font-weight: bold; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; background: #0f172a; color: white; border: 1px solid var(--primary); box-sizing: border-box; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .worker-box, .artikel-box { background: rgba(56,189,248,0.05); padding: 15px; border-radius: 15px; margin-top: 15px; border-left: 4px solid var(--primary); position: relative; }
        .delete-btn { position: absolute; right: 10px; top: 10px; background: red; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .add-btn { width: 100%; padding: 12px; margin-top: 10px; background: transparent; border: 2px dashed var(--primary); color: var(--primary); border-radius: 10px; cursor: pointer; font-weight: bold; }
        .sub-btn { padding: 10px; background: #1e40af; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .main-btn { width: 100%; padding: 18px; background: var(--primary); color: #0f172a; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; margin-top: 30px; cursor: pointer; }
        .code-row { display: flex; gap: 5px; margin-top: 8px; }
        .code-row select { flex: 2; }
        .code-row input { flex: 1; }
        .row-del { background: none; border: none; color: red; font-weight: bold; cursor: pointer; }
        .error-msg { color: #fbbf24; font-size: 12px; font-weight: bold; margin-top: 8px; border: 1px solid #fbbf24; padding: 5px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <div class="title-area">
        <h1 style="margin:0; font-size:22px;">Adler Pelzer Group</h1>
        <p style="margin:5px; color:var(--primary); font-weight:bold;">Production Bericht Bochum</p>
    </div>

    <label>Schicht wählen</label>
    <select id="schichtWahl" onchange="updateWorkerList()">
        <option value="B">Schicht - B</option>
        <option value="A">Schicht - A</option>
        <option value="C">Schicht - C</option>
    </select>

    <label style="margin-top:20px;">Personal (Mitarbeiter)</label>
    <div id="workerContainer"></div>
    <button type="button" class="add-btn" onclick="addWorker()">+ Mitarbeiter hinzufügen</button>

    <div class="grid-2" style="margin-top:20px;">
        <div><label>Datum</label><input type="date" id="datum"></div>
        <div>
            <label>Anlage</label>
            <select id="anlage" onchange="handleAnlageChange(this.value)">
                <option value="">Wählen...</option>
                <option value="PUR">PUR Anlage</option>
                <option value="IM_CIM">Spritzguss (IM/CIM)</option>
                <option value="COM">Compound</option>
            </select>
        </div>
    </div>

    <div id="ftBox" style="display:none; margin-top:15px;">
        <label>Formträger (FT)</label>
        <div class="grid-2" style="grid-template-columns: repeat(3, 1fr); background: #0f172a; padding: 10px; border-radius: 10px;">
            <div><input type="checkbox" class="ft-check" value="FT1"> FT1</div>
            <div><input type="checkbox" class="ft-check" value="FT2"> FT2</div>
            <div><input type="checkbox" class="ft-check" value="FT3"> FT3</div>
            <div><input type="checkbox" class="ft-check" value="FT4"> FT4</div>
            <div><input type="checkbox" class="ft-check" value="FT5"> FT5</div>
            <div><input type="checkbox" class="ft-check" value="FT6"> FT6</div>
        </div>
    </div>

    <div id="comTimeBox" style="display:none; margin-top:15px; text-align:center;">
        <span style="color:var(--primary); font-weight:bold;">Compound Zeit: <span id="comCounter">0</span> / 480 Min</span>
    </div>

    <div id="artikelContainer"></div>
    <button type="button" class="add-btn" onclick="addArtikel()">+ Artikel hinzufügen</button>

    <button type="button" id="sendBtn" onclick="speichernUndSenden()">🚀 SPEICHERN & SENDEN</button>
</div>

<script src="app.js"></script>
</body>
</html>
